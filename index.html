<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact</title>

  <!-- Police -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Icônes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #ffffff;
      text-align: center;
      position: relative;
    }

    /* Logo en haut à droite */
 .logo {
  position: absolute;
  top: -10px;   /* remonte clairement */
  right: 80px;
  font-size: 90px;

  animation: fadeSlide 1s ease forwards, float 3s ease-in-out infinite;
}
    h1 {
      margin-top: 180px;
      font-size: 42px;
      color: black;
      font-weight: 700;
      text-align: center;
    }

    p {
  margin: 30px 20px 60px;
  font-size: 18px;
  font-weight: 600;
  font-style: italic; /* IMPORTANT */
  color: #444;
}

    .container {
      margin-top: 20px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 15px;
      margin: 20px auto;
      padding: 16px 20px;
      width: 280px;
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .btn i {
      font-size: 20px;
      width: 25px;
      text-align: center;
    }

    .btn span {
      flex: 1;
      text-align: center;
    }

    /* Couleurs réseaux */
    .facebook { background: #1877f2; }
    .whatsapp { background: #25d366; }
    .snapchat { background: #fffc00; color: black; }
    .instagram { 
      background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af, #515bd4);
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    /* Animation entrée */
@keyframes fadeSlide {
  from {
    opacity: 0;
    transform: translateY(-20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Animation flottante */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(6px); }
  100% { transform: translateY(0px); }
}
  </style>
</head>

<body>

<!-- Logo (temporaire Amazon) -->
<div class="logo">
  <i class="fab fa-amazon"></i>
</div>

<h1>Bienvenue</h1>

<p>Cliquez sur l’un des boutons ci-dessous pour accéder à mes plateformes.</p>

<div class="container">

  <a href="#" class="btn facebook">
    <i class="fab fa-facebook"></i>
    <span>Facebook</span>
  </a>

  <a href="#" class="btn whatsapp">
    <i class="fab fa-whatsapp"></i>
    <span>WhatsApp</span>
  </a>

  <a href="#" class="btn snapchat">
    <i class="fab fa-snapchat"></i>
    <span>Snapchat</span>
  </a>

  <a href="#" class="btn instagram">
    <i class="fab fa-instagram"></i>
    <span>Instagram</span>
  </a>

</div>

</body>
</html>
