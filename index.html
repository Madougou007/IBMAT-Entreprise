<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background: white;
    }

    h1 {
      margin-top: 80px;
      font-size: 32px;
      color: #00aaff;
    }

    p {
      margin: 20px 20px 40px;
      font-size: 16px;
      font-weight: bold;
      font-style: italic;
      color: #333;
    }

    .btn {
      display: block;
      margin: 20px auto;
      padding: 15px;
      width: 240px;
      background: #00aaff;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0077cc;
    }
  </style>
</head>
<body>

<h1>Bienvenue</h1>

<p>Cliquez sur l’un des boutons ci-dessous pour rejoindre mes pages.</p>

<a href="#" class="btn">Facebook</a>
<a href="#" class="btn">WhatsApp</a>
<a href="#" class="btn">Snapchat</a>
<a href="#" class="btn">Instagram</a>

</body>
</html>
