<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Font Awesome (icônes) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<title>Contact</title>

<style>

body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 0;
    text-align: center;
}

/* Container */
.container {
    margin-top: 120px;
}

/* Titre */
h1 {
    font-size: 42px;
    font-weight: 700;
    color: black;
    margin-bottom: 20px;
}

/* Texte */
p {
    margin: 0 20px 60px;
    font-size: 18px;
    color: #444;
    font-style: italic;
    font-weight: 500;
    letter-spacing: 0.5px;
}

/* Boutons */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;

    width: 280px;
    margin: 15px auto;
    padding: 15px;

    border-radius: 40px;
    text-decoration: none;
    font-weight: 500;
    color: white;

    box-shadow: 0 8px 20px rgba(0,0,0,0.1);

    transition: all 0.3s ease;
}

/* Animation hover premium */
.btn:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 12px 30px rgba(0,0,0,0.2);
}

/* Icônes */
.btn i {
    font-size: 18px;
}

/* Couleurs réseaux */
.facebook {
    background: #1877f2;
}

.whatsapp {
    background: #25d366;
}

.snapchat {
    background: #fffc00;
    color: black;
}

.instagram {
    background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
}

</style>

</head>

<body>

<div class="container">

<h1>Bienvenue</h1>

<p>
Cliquez sur l’un des boutons ci-dessous pour accéder à mes plateformes.
</p>

<a href="https://facebook.com" target="_blank" class="btn facebook">
    <i class="fab fa-facebook"></i> Facebook
</a>

<a href="https://wa.me/123456789" target="_blank" class="btn whatsapp">
    <i class="fab fa-whatsapp"></i> WhatsApp
</a>

<a href="https://snapchat.com" target="_blank" class="btn snapchat">
    <i class="fab fa-snapchat"></i> Snapchat
</a>

<a href="https://instagram.com" target="_blank" class="btn instagram">
    <i class="fab fa-instagram"></i> Instagram
</a>

</div>

</body>
</html>
