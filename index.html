<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<style>

body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  padding: 0;
  background: white;
}

/* TITRE */
h1 {
  margin-top: 180px;
  font-size: 36px;
  font-weight: bold;
  color: black;
}

/* TEXTE */
p {
  margin: 30px 20px 60px;
  font-size: 18px;
  font-weight: normal; /* correction */
  font-style: italic;
  color: #444;
}

/* BOUTONS */
.btn {
  display: block;
  margin: 15px auto;
  padding: 15px;
  width: 260px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  transition: 0.3s;
}

/* FACEBOOK */
.facebook {
  background: #1877f2;
}

/* WHATSAPP */
.whatsapp {
  background: #25D366;
}

/* SNAPCHAT */
.snapchat {
  background: #FFFC00;
  color: black;
}

/* INSTAGRAM */
.instagram {
  background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af, #515bd4);
}

.btn:hover {
  opacity: 0.85;
}

</style>
</head>

<body>

<h1>Bienvenue</h1>

<p><em>Cliquez sur l’un des boutons ci-dessous pour accéder à mes plateformes.</em></p>

<a href="#" class="btn facebook">Facebook</a>
<a href="#" class="btn whatsapp">WhatsApp</a>
<a href="#" class="btn snapchat">Snapchat</a>
<a href="#" class="btn instagram">Instagram</a>

</body>
</html>
