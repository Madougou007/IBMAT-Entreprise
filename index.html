<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Poppins', sans-serif;
  text-align: center;
  margin: 0;
  padding: 0;
  background: white;
}

/* TITRE */
h1 {
  margin-top: 180px;
  font-size: 40px;
  font-weight: 600;
  color: black;
}

/* TEXTE */
p {
  margin: 20px auto 70px;
  font-size: 18px;
  font-style: italic; /* MAINTENANT VISIBLE */
  color: #444;
  max-width: 500px;
  line-height: 1.6;
}

/* BOUTONS */
.btn {
  display: block;
  margin: 15px auto;
  padding: 15px;
  width: 260px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 600;
  color: white;
  transition: 0.3s;
}

/* FACEBOOK */
.facebook {
  background: #1877f2;
}

/* WHATSAPP */
.whatsapp {
  background: #25D366;
}

/* SNAPCHAT */
.snapchat {
  background: #FFFC00;
  color: black;
}

/* INSTAGRAM */
.instagram {
  background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af, #515bd4);
}

.btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

</style>
</head>

<body>

<h1>Bienvenue</h1>

<p>Cliquez sur l’un des boutons ci-dessous pour accéder à mes plateformes.</p>

<a href="#" class="btn facebook">Facebook</a>
<a href="#" class="btn whatsapp">WhatsApp</a>
<a href="#" class="btn snapchat">Snapchat</a>
<a href="#" class="btn instagram">Instagram</a>

</body>
</html>
