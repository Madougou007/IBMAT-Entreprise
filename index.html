<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<title>Contact</title>

<style>

body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 0;
    text-align: center;
}

/* CONTENEUR GLOBAL */
.container {
    margin-top: 120px;
}

/* TITRE */
h1 {
    font-size: 42px;
    font-weight: 700;
    color: black;
    margin-bottom: 15px;
}

/* TEXTE */
p {
    margin: 0 20px 60px;
    font-size: 18px;
    color: #444;
    font-style: italic;
    font-weight: 500;
    letter-spacing: 0.5px;
}

/* BLOC DES BOUTONS (nouveau → améliore visuel sans changer contenu) */
.buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
}

/* BOUTONS */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;

    width: 280px;
    padding: 15px;

    border-radius: 40px;
    text-decoration: none;
    font-weight: 500;
    color: white;

    box-shadow: 0 6px 15px rgba(0,0,0,0.1);

    transition: all 0.25s ease;
}

/* HOVER AMÉLIORÉ (plus subtil et pro) */
.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* ICÔNES */
.btn i {
    font-size: 18px;
}

/* COULEURS (inchangées) */
.facebook { background: #1877f2; }
.whatsapp { background: #25d366; }
.snapchat { background: #fffc00; color: black; }
.instagram { background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af); }

    /* Effet clic (mobile feel) */
.btn:active {
    transform: scale(0.95);
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
</style>

</head>

<body>

<div class="container">

<h1>Bienvenue</h1>

<p>
Cliquez sur l’un des boutons ci-dessous pour accéder à mes plateformes.
</p>

<div class="buttons">

<a href="https://facebook.com" target="_blank" class="btn facebook">
<i class="fab fa-facebook"></i> Facebook
</a>

<a href="https://wa.me/123456789" target="_blank" class="btn whatsapp">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>

<a href="https://snapchat.com" target="_blank" class="btn snapchat">
<i class="fab fa-snapchat"></i> Snapchat
</a>

<a href="https://instagram.com" target="_blank" class="btn instagram">
<i class="fab fa-instagram"></i> Instagram
</a>

</div>

</div>

</body>
</html>
