<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact</title>

  <!-- Police -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Icônes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #ffffff;
      text-align: center;
    }

    h1 {
      margin-top: 100px;
      font-size: 38px;
      color: #00aaff;
      font-weight: 700;
    }

    p {
      margin: 25px 20px 60px;
      font-size: 18px;
      font-weight: 600;
      font-style: italic;
      color: #444;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 15px;
      margin: 20px auto;
      padding: 16px 20px;
      width: 280px;
      background: #00aaff;
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .btn i {
      font-size: 20px;
      width: 25px;
      text-align: center;
    }

    .btn span {
      flex: 1;
      text-align: center;
    }

    .btn:hover {
      background: #008ecc;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h1>Bienvenue</h1>

<p>Cliquez sur l’un des boutons ci-dessous pour accéder à mes plateformes.</p>

<a href="#" class="btn">
  <i class="fab fa-facebook"></i>
  <span>Facebook</span>
</a>

<a href="#" class="btn">
  <i class="fab fa-whatsapp"></i>
  <span>WhatsApp</span>
</a>

<a href="#" class="btn">
  <i class="fab fa-snapchat"></i>
  <span>Snapchat</span>
</a>

<a href="#" class="btn">
  <i class="fab fa-instagram"></i>
  <span>Instagram</span>
</a>

</body>
</html>
