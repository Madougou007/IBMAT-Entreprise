<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #000000, #434343);
      color: white;
    }

    h1 {
      margin-top: 60px;
      font-size: 28px;
    }

    p {
      margin: 10px 20px 30px;
      font-size: 16px;
      color: #ddd;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 15px;
      width: 240px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00c6ff;
      color: white;
    }
  </style>
</head>
<body>

<h1>Bienvenue</h1>

<p>Cliquez sur l’un des boutons ci-dessous pour rejoindre mes pages.</p>

<a href="#" class="btn">Facebook</a>
<a href="#" class="btn">WhatsApp</a>
<a href="#" class="btn">Snapchat</a>
<a href="#" class="btn">Instagram</a>

</body>
</html>
