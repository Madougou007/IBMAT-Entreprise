<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact</title>

  <!-- Police -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Icônes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Logo en haut à droite */
    .top-right {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 30px;
      color: #000;
    }

    h1 {
      margin-top: 120px;
      font-size: 42px;
      color: #000000;
      font-weight: 700;
      text-align: center;
    }

    p {
      margin: 40px 20px 60px;
      font-size: 18px;
      font-weight: 600;
      font-style: italic;
      color: #444;
      text-align: center;
    }

    .container {
      text-align: center;
      width: 100%;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 15px;
      margin: 20px auto;
      padding: 16px 20px;
      width: 280px;
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .btn i {
      font-size: 20px;
      width: 25px;
      text-align: center;
    }

    .btn span {
      flex: 1;
      text-align: center;
    }

    /* Couleurs réseaux */
    .facebook { background: #1877f2; }
    .whatsapp { background: #25d366; }
    .snapchat { background: #fffc00; color: black; }
    .instagram { 
      background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af, #515bd4);
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
  </style>
</head>

<body>

<!-- Logo Amazon -->
<div class="top-right">
  <i class="fab fa-amazon"></i>
</div>

<h1>Bienvenue</h1>

<p>Cliquez sur l’un des boutons ci-dessous pour accéder à mes plateformes.</p>

<div class="container">

  <a href="#" class="btn facebook">
    <i class="fab fa-facebook"></i>
    <span>Facebook</span>
  </a>

  <a href="#" class="btn whatsapp">
    <i class="fab fa-whatsapp"></i>
    <span>WhatsApp</span>
  </a>

  <a href="#" class="btn snapchat">
    <i class="fab fa-snapchat"></i>
    <span>Snapchat</span>
  </a>

  <a href="#" class="btn instagram">
    <i class="fab fa-instagram"></i>
    <span>Instagram</span>
  </a>

</div>

</body>
</html>
