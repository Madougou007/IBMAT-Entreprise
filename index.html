<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<title>Contact</title>

<style>

body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 0;
    text-align: center;
}

/* Contenu centré et descendu */
.container {
    margin-top: 120px;
}

/* Titre */
h1 {
    font-size: 40px;
    font-weight: 700;
    color: black;
    margin-bottom: 20px;
}

/* Texte */
p {
    margin: 0 20px 60px;
    font-size: 18px;
    color: #444;
    font-style: italic;
    font-weight: 500;
    letter-spacing: 0.5px;
}

/* Boutons */
.btn {
    display: block;
    width: 260px;
    margin: 15px auto;
    padding: 15px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 500;
    color: white;
    transition: 0.3s;
}

/* Effet hover */
.btn:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

/* Couleurs réseaux */
.facebook {
    background: #1877f2;
}

.whatsapp {
    background: #25d366;
}

.snapchat {
    background: #fffc00;
    color: black;
}

.instagram {
    background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
}

</style>

</head>

<body>

<div class="container">

<h1>Bienvenue</h1>

<p>
Cliquez sur l’un des boutons ci-dessous pour accéder à mes plateformes.
</p>

<a href="#" class="btn facebook">Facebook</a>
<a href="#" class="btn whatsapp">WhatsApp</a>
<a href="#" class="btn snapchat">Snapchat</a>
<a href="#" class="btn instagram">Instagram</a>

</div>

</body>
</html>
